<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সাওতুল কুরআন EMS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-800">প্যানেল লগইন</h2>
            <select id="userRole" class="w-full border p-3 rounded-lg mb-4">
                <option value="admin">এডমিন প্যানেল</option>
                <option value="teacher">শিক্ষক প্যানেল</option>
                <option value="guardian">অভিভাবক প্যানেল</option>
            </select>
            <input type="password" id="password" placeholder="গোপন কোড" class="w-full border p-3 rounded-lg mb-6">
            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen">
        <nav class="w-64 bg-emerald-900 text-white p-6">
            <h2 class="font-bold text-lg mb-6">মাদরাসা মেনু</h2>
            <ul class="space-y-4">
                <li class="cursor-pointer hover:text-emerald-300" onclick="showPanel('adminPanel')">ড্যাশবোর্ড (এডমিন)</li>
                <li class="cursor-pointer hover:text-emerald-300" onclick="showPanel('admissionPanel')">ভর্তি ফরম</li>
                <li class="cursor-pointer hover:text-emerald-300" onclick="showPanel('resultPanel')">রেজাল্ট ম্যানেজমেন্ট</li>
            </ul>
        </nav>

        <main class="flex-1 p-8 overflow-y-auto">
            
            <div id="adminPanel" class="panel active">
                <h2 class="text-2xl font-bold mb-4">এডমিন ড্যাশবোর্ড</h2>
                <div class="bg-white p-6 rounded-xl shadow">
                    <p class="mb-4">সবকিছু সংশোধন, সংযোজন ও বিয়োজনের ক্ষমতা এখানে:</p>
                    <input type="text" placeholder="ক্যাডেট আইডি সেট করুন" class="border p-2 w-full mb-2">
                    <button class="bg-red-600 text-white px-4 py-2 rounded">আপডেট ডাটাবেস</button>
                </div>
            </div>

            <div id="admissionPanel" class="panel">
                <h2 class="text-2xl font-bold mb-4">বিস্তারিত ভর্তি ফরম</h2>
                <div class="bg-white p-6 rounded-xl shadow space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="শিক্ষার্থীর নাম" class="border p-2 rounded">
                        <input type="text" placeholder="ক্যাডেট নম্বর (SQIHMC-)" class="border p-2 rounded">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 border-t pt-4">
                        <input type="text" placeholder="পিতার নাম" class="border p-2 rounded">
                        <input type="text" placeholder="পিতার পেশা" class="border p-2 rounded">
                        <input type="text" placeholder="পিতার শিক্ষাগত যোগ্যতা" class="border p-2 rounded">
                        <input type="text" placeholder="পিতার মোবাইল" class="border p-2 rounded">
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t pt-4">
                        <input type="text" placeholder="মাতার নাম" class="border p-2 rounded">
                        <input type="text" placeholder="মাতার পেশা" class="border p-2 rounded">
                        <input type="text" placeholder="মাতার শিক্ষাগত যোগ্যতা" class="border p-2 rounded">
                        <input type="text" placeholder="মাতার মোবাইল" class="border p-2 rounded">
                    </div>

                    <input type="text" placeholder="গ্রাম, থানা, ডাকঘর, উপজেলা, জেলা, বিভাগ" class="w-full border p-2 rounded">
                    <button class="bg-green-700 text-white w-full py-3 rounded font-bold">আবেদন জমা দিন</button>
                </div>
            </div>

            <div id="resultPanel" class="panel">
                <h2 class="text-2xl font-bold mb-4">রেজাল্ট ম্যানেজমেন্ট</h2>
                <div class="bg-white p-6 rounded-xl shadow">
                    <p>শিক্ষক এখান থেকে রেজাল্ট দিবেন এবং এডমিন এপ্রুভ করবেন।</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleLogin() {
            const pass = document.getElementById('password').value;
            const role = document.getElementById('userRole').value;
            
            let auth = (role === 'admin' && pass === 'Riazcox@88') || 
                       (role === 'teacher' && pass === 'SQIHMC23') || 
                       (role === 'guardian' && pass === 'Sawtulquran23');

            if (auth) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }
    </script>
</body>
</html>
