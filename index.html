<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাওতুল কুরআন ইন্টারন্যাশনাল হিফয মাদরাসা EMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel { display: none; }
        .active { display: block; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-800">প্যানেল লগইন</h2>
            <select id="userRole" class="w-full border p-3 rounded-lg mb-4">
                <option value="admin">এডমিন প্যানেল</option>
                <option value="teacher">শিক্ষক প্যানেল</option>
                <option value="guardian">অভিভাবক প্যানেল</option>
            </select>
            <input type="password" id="password" placeholder="গোপন কোড" class="w-full border p-3 rounded-lg mb-6">
            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-5xl mx-auto">
        <header class="bg-white p-6 rounded-xl shadow mb-6 text-center">
            <h1 class="text-2xl font-bold text-emerald-900">সাওতুল কুরআন ইন্টারন্যাশনাল হিফয মাদরাসা</h1>
            <p id="user-info" class="text-sm text-gray-500 mt-2 font-bold"></p>
        </header>

        <div id="adminPanel" class="panel bg-white p-6 rounded-xl shadow mb-6 border-l-8 border-red-600">
            <h2 class="text-xl font-bold mb-4">এডমিন ড্যাশবোর্ড</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="border p-4 rounded">
                    <label class="font-bold">ক্যাডেট নম্বর সেট করুন (SQIHMC-XXXX):</label>
                    <div class="flex mt-2">
                        <span class="bg-gray-200 p-2 rounded-l border border-r-0">SQIHMC-</span>
                        <input type="text" id="cadetInput" placeholder="001" class="border p-2 rounded-r w-full">
                    </div>
                </div>
                <button onclick="alert('সংশোধন সেভ হয়েছে!')" class="bg-blue-600 text-white px-6 py-2 rounded">ডাটাবেস সংশোধন করুন</button>
            </div>
        </div>

        <div id="teacherPanel" class="panel bg-white p-6 rounded-xl shadow mb-6 border-l-8 border-blue-600">
            <h2 class="text-xl font-bold mb-4">শিক্ষক প্যানেল: রেজাল্ট তৈরি</h2>
            <p>শ্রেণি শিক্ষকরা এখান থেকে রেজাল্ট ইনপুট দিবেন। (এডমিন এপ্রুভাল সাপেক্ষে)</p>
        </div>

        <div id="guardianPanel" class="panel bg-white p-6 rounded-xl shadow mb-6 border-l-8 border-green-600">
            <h2 class="text-xl font-bold mb-4">অনলাইন ভর্তি ও ফলাফল</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="শিক্ষার্থীর নাম" class="border p-2 rounded">
                <input type="text" placeholder="পিতার নাম ও পেশা" class="border p-2 rounded">
                <input type="text" placeholder="মাতার নাম ও পেশা" class="border p-2 rounded">
                <input type="text" placeholder="মোবাইল নম্বর" class="border p-2 rounded">
                <input type="text" placeholder="গ্রাম, থানা, ডাকঘর, উপজেলা, জেলা, বিভাগ" class="col-span-2 border p-2 rounded">
                <button class="col-span-2 bg-emerald-700 text-white p-3 rounded font-bold">আবেদন জমা দিন</button>
            </form>
        </div>
    </div>

    <script>
        function handleLogin() {
            const secret = "Riazcox@88";
            const pass = document.getElementById('password').value;
            const role = document.getElementById('userRole').value;

            if (role === 'admin' && pass !== secret) {
                return alert("ভুল কোড!");
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info').innerText = "স্বাগতম: " + role.toUpperCase();
            
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(role + 'Panel').classList.add('active');
        }
    </script>
</body>
</html>
