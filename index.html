<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- লগইন প্যানেল -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-800">লগইন প্যানেল</h2>
            <select id="userRole" class="w-full border p-3 rounded-lg mb-4">
                <option value="admin">এডমিন</option>
                <option value="teacher">শিক্ষক</option>
                <option value="guardian">অভিভাবক</option>
            </select>
            <input type="password" id="password" placeholder="গোপন কোড" class="w-full border p-3 rounded-lg mb-6">
            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold">প্রবেশ করুন</button>
        </div>
    </div>

    <!-- মূল অ্যাপ্লিকেশন -->
    <div id="main-app" class="hidden p-4 max-w-4xl mx-auto">
        <header class="bg-white p-6 rounded-xl shadow mb-6 text-center">
            <h1 class="text-2xl font-bold text-emerald-900">সাওতুল কুরআন ইন্টারন্যাশনাল হিফয মাদরাসা</h1>
            <p id="user-info" class="text-sm text-gray-500 mt-2"></p>
        </header>

        <!-- এডমিন কন্ট্রোল প্যানেল -->
        <div id="admin-panel" class="hidden bg-white p-6 rounded-xl shadow mb-6">
            <h2 class="text-xl font-bold mb-4">এডমিন কনফিগারেশন</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="ক্লাস বা নতুন তথ্য যোগ করুন" class="border p-2 rounded">
                <button class="bg-blue-600 text-white p-2 rounded">সংরক্ষণ করুন</button>
            </div>
        </div>

        <!-- ভর্তি ও রেজাল্ট সেকশন -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-4">অনলাইন ভর্তি ফরম</h3>
                <form class="space-y-3">
                    <input type="text" placeholder="শিক্ষার্থীর নাম" class="w-full border p-2 rounded">
                    <select class="w-full border p-2 rounded">
                        <option>নার্সারী থেকে অষ্টম শ্রেণি</option>
                        <option>কায়দা, আমপারা, নাযেরা, হিফয</option>
                    </select>
                    <input type="text" placeholder="পিতার নাম ও পেশা" class="w-full border p-2 rounded">
                    <input type="text" placeholder="মাতার নাম ও পেশা" class="w-full border p-2 rounded">
                    <input type="text" placeholder="গ্রাম, থানা, ডাকঘর, উপজেলা, জেলা" class="w-full border p-2 rounded">
                    <button class="w-full bg-green-600 text-white py-2 rounded">আবেদন জমা দিন</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-4">অনলাইন রেজাল্ট</h3>
                <button onclick="showResult()" class="w-full bg-indigo-600 text-white py-3 rounded">রেজাল্ট কার্ড দেখুন</button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const secret = "Riazcox@88";
            const pass = document.getElementById('password').value;
            const role = document.getElementById('userRole').value;

            if (role === 'admin' && pass !== secret) {
                return alert("ভুল কোড! শুধুমাত্র এডমিন প্রবেশ করতে পারবেন।");
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info').innerText = "স্বাগতম: " + role.toUpperCase();
            
            if(role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
        }

        function showResult() {
            alert("রেজাল্ট কার্ড জেনারেট হচ্ছে... এখানে গ্রেড, GPA, এবং পজিশন অটোমেটিক দেখাবে।");
        }
    </script>
</body>
</html>
