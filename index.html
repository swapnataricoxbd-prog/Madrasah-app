<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাওতুল কুরআন EMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <!-- লগইন প্যানেল (সুরক্ষার জন্য) -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-800">লগইন প্যানেল</h2>
            <select id="userRole" class="w-full border p-3 rounded-lg mb-4">
                <option value="admin">এডমিন প্যানেল</option>
                <option value="teacher">শিক্ষক প্যানেল</option>
                <option value="guardian">অভিভাবক প্যানেল</option>
            </select>
            <input type="password" id="password" placeholder="গোপন কোড" class="w-full border p-3 rounded-lg mb-6">
            <button onclick="handleLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold">প্রবেশ করুন</button>
        </div>
    </div>

    <!-- মূল অ্যাপ্লিকেশন কন্টেইনার -->
    <div id="main-app" class="hidden max-w-4xl mx-auto">
        
        <!-- হেডলাইন -->
        <div class="bg-emerald-800 text-white p-6 rounded-xl shadow-lg mb-6">
            <h1 class="text-2xl font-bold">সাওতুল কুরআন ইন্টারন্যাশনাল হিফয মাদরাসা</h1>
            <p>বনফুল শো-রুমের ২য় তলা, জিরো পয়েন্ট, কক্সবাজার।</p>
        </div>

        <!-- এডমিন কনফিগারেশন প্যানেল -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <h2 class="text-xl font-bold mb-4">এডমিন কনফিগারেশন</h2>
            <input type="text" placeholder="ক্লাস বা নতুন তথ্য যোগ করুন" class="w-full border p-3 rounded mb-4">
            <div class="flex gap-2">
                <span class="bg-gray-200 p-3 rounded border">SQIHMC -</span>
                <input type="text" placeholder="ক্যাডেট নম্বর (যেমন: 001)" class="w-full border p-3 rounded">
            </div>
            <button class="w-full bg-blue-600 text-white p-3 rounded mt-4">সংরক্ষণ করুন</button>
        </div>

        <!-- অনলাইন ভর্তি ফরম -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <h2 class="text-xl font-bold mb-4">অনলাইন ভর্তি ফরম</h2>
            <div class="space-y-4">
                <input type="text" placeholder="শিক্ষার্থীর নাম" class="w-full border p-3 rounded">
                <select class="w-full border p-3 rounded">
                    <option>নার্সারী থেকে অষ্টম শ্রেণি</option>
                    <option>কায়দা, আমপারা, নাযেরা, হিফয</option>
                </select>
                <input type="text" placeholder="পিতার নাম, পেশা ও শিক্ষাগত যোগ্যতা" class="w-full border p-3 rounded">
                <input type="text" placeholder="মাতার নাম, পেশা ও শিক্ষাগত যোগ্যতা" class="w-full border p-3 rounded">
                <input type="text" placeholder="মোবাইল নম্বর" class="w-full border p-3 rounded">
                <input type="text" placeholder="গ্রাম, থানা, ডাকঘর, উপজেলা, জেলা ও বিভাগ" class="w-full border p-3 rounded">
                <button class="w-full bg-green-600 text-white p-3 rounded">আবেদন জমা দিন</button>
            </div>
        </div>

        <!-- অনলাইন রেজাল্ট প্যানেল -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4">অনলাইন রেজাল্ট</h2>
            <button class="w-full bg-indigo-600 text-white p-4 rounded text-lg font-bold">রেজাল্ট কার্ড দেখুন</button>
        </div>

    </div>

    <script>
        function handleLogin() {
            const secret = "Riazcox@88";
            const pass = document.getElementById('password').value;
            const role = document.getElementById('userRole').value;

            if (role === 'admin' && pass !== secret) {
                return alert("ভুল গোপন কোড!");
            }
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
    </script>
</body>
</html>
